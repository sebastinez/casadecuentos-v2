# Template showing the secret KEYS this deployment expects. DO NOT put real
# values here and DO NOT commit a real secrets.yaml in plaintext.
#
# Create the encrypted file with:
#   cd nix && cp secrets/secrets.example.yaml secrets/secrets.yaml
#   sops secrets/secrets.yaml      # opens $EDITOR; fill in real values; saves encrypted
#
# The encrypted secrets/secrets.yaml IS safe to commit (it's the sops point).

# Stripe (LIVE keys for production)
stripe_secret_key: sk_live_xxx
# Created when you add the prod webhook endpoint in the Stripe dashboard
# (https://<domain>/api/webhooks/stripe) — NOT the local `stripe listen` secret.
stripe_webhook_secret: whsec_xxx

# The PocketBase superuser the BFF authenticates as to write/flip orders
pocketbase_admin_email: admin@casadecuentos.ch
pocketbase_admin_password: a-long-random-password

# Resend (EU) transactional email API key
resend_api_key: re_xxx

# Hetzner Object Storage (S3) credentials for backups + a restic repo password
s3_access_key_id: xxx
s3_secret_access_key: xxx
restic_password: another-long-random-password
