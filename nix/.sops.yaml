# sops configuration. `sops secrets/secrets.yaml` encrypts to BOTH your personal
# age key (so you can edit) and the server's host age key (so it can decrypt at
# boot). Fill in the two public keys below, then run:
#   sops updatekeys secrets/secrets.yaml   # after changing recipients
#
# Get your personal key:   age-keygen -o ~/.config/sops/age/keys.txt  (prints the public key)
# Get the host key (after the box exists):
#   ssh root@<server-ip> 'cat /etc/ssh/ssh_host_ed25519_key.pub' | ssh-to-age
keys:
  - &admin age1qsfsf48gmvlc695jrl9qdeza5tkl28f9xcmsjaln382ge9kzcvaqgyva4g
  - &host age1f2jqkwqweqq7dryeutp3h38c3xztr7u0ldvfsl89emgkckf3kcuq5h73zt

creation_rules:
  - path_regex: secrets/secrets\.yaml$
    key_groups:
      - age:
          - *admin
          - *host
